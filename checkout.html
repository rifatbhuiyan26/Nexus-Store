<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <title>Nexus - Checkout</title>
</head>
<body class="min-h-screen flex justify-center items-center p-6">

    <div class="w-full max-w-[400px] glass-btn p-8 rounded-[2.5rem] z-10">
        <h2 class="text-3xl font-black italic uppercase tracking-tighter text-white mb-6">
            Final <span class="text-[#c3f5ff]">Step</span>
        </h2>

        <form id="checkoutForm" class="space-y-5">
            <div>
                <label class="text-[10px] uppercase font-bold text-gray-400 tracking-widest ml-2">Full Name</label>
                <input type="text" required placeholder="Full Name" 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white text-sm focus:outline-none focus:border-[#c3f5ff] transition-all">
            </div>

            <div>
                <label class="text-[10px] uppercase font-bold text-gray-400 tracking-widest ml-2">Phone Number</label>
                <input type="tel" required placeholder="+880 1XXX XXXXXX" 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white text-sm focus:outline-none focus:border-[#c3f5ff] transition-all">
            </div>

            <div>
                <label class="text-[10px] uppercase font-bold text-gray-400 tracking-widest ml-2">Delivery Address</label>
                <textarea required placeholder="House, Road, City..." rows="3"
                    class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white text-sm focus:outline-none focus:border-[#c3f5ff] transition-all resize-none"></textarea>
            </div>

            <div class="py-4 border-t border-white/5 mt-4">
                <div class="flex justify-between text-xs uppercase font-bold">
                    <span class="text-gray-500">Shipping</span>
                    <span class="text-[#c3f5ff]">Free</span>
                </div>
            </div>

            <button type="submit" 
                class="w-full py-4 bg-[#c3f5ff] text-black font-black rounded-2xl text-[10px] uppercase tracking-widest hover:bg-white transition-all shadow-lg active:scale-95">
                Confirm Order
            </button>
        </form>

        <div class="text-center mt-6">
            <a href="product.html" class="text-[9px] font-bold text-gray-500 hover:text-white uppercase tracking-widest">
                ← Change Items
            </a>
        </div>
    </div>

    <script>
        document.getElementById('checkoutForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Order Placed Successfully! We will contact you soon.');
            localStorage.removeItem('nexus_cart');
            window.location.href = 'home.html';
        });
    </script>
</body>
</html>
